<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#c13d3d" rx="20"/>
  
  <!-- Keyboard representation -->
  <g transform="translate(20, 35)">
    <!-- Keyboard body -->
    <rect x="0" y="0" width="60" height="30" fill="#ffffff" rx="4"/>
    
    <!-- Keys row 1 -->
    <rect x="4" y="4" width="6" height="6" fill="#f0f0f0" rx="1"/>
    <rect x="12" y="4" width="6" height="6" fill="#f0f0f0" rx="1"/>
    <rect x="20" y="4" width="6" height="6" fill="#f0f0f0" rx="1"/>
    <rect x="28" y="4" width="6" height="6" fill="#f0f0f0" rx="1"/>
    <rect x="36" y="4" width="6" height="6" fill="#f0f0f0" rx="1"/>
    <rect x="44" y="4" width="6" height="6" fill="#f0f0f0" rx="1"/>
    <rect x="52" y="4" width="6" height="6" fill="#f0f0f0" rx="1"/>
    
    <!-- Keys row 2 -->
    <rect x="4" y="12" width="6" height="6" fill="#f0f0f0" rx="1"/>
    <rect x="12" y="12" width="6" height="6" fill="#f0f0f0" rx="1"/>
    <rect x="20" y="12" width="6" height="6" fill="#c13d3d" rx="1"/>
    <rect x="28" y="12" width="6" height="6" fill="#f0f0f0" rx="1"/>
    <rect x="36" y="12" width="6" height="6" fill="#f0f0f0" rx="1"/>
    <rect x="44" y="12" width="6" height="6" fill="#f0f0f0" rx="1"/>
    <rect x="52" y="12" width="6" height="6" fill="#f0f0f0" rx="1"/>
    
    <!-- Keys row 3 -->
    <rect x="4" y="20" width="6" height="6" fill="#f0f0f0" rx="1"/>
    <rect x="12" y="20" width="6" height="6" fill="#f0f0f0" rx="1"/>
    <rect x="20" y="20" width="6" height="6" fill="#f0f0f0" rx="1"/>
    <rect x="28" y="20" width="6" height="6" fill="#f0f0f0" rx="1"/>
    <rect x="36" y="20" width="6" height="6" fill="#f0f0f0" rx="1"/>
    <rect x="44" y="20" width="6" height="6" fill="#f0f0f0" rx="1"/>
    <rect x="52" y="20" width="6" height="6" fill="#f0f0f0" rx="1"/>
